<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Message - SETTribe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        
        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        
        input,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #218838;
        }
        
        .alert {
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Broadcast Message to All Users</h2>

        {% with messages = get_flashed_messages() %} {% if messages %}
        <div class="alert">
            {% for message in messages %} {{ message }} {% endfor %}
        </div>
        {% endif %} {% endwith %}

        <form method="POST" action="/broadcast">
            <label>Target:</label>
            <input type="text" name="target" placeholder="e.g. System Update" required>

            <label>Notification Title:</label>
            <input type="text" name="title" placeholder="e.g. System Update" required>

            <label>Notification Message:</label>
            <textarea name="message" rows="4" placeholder="Type your message here..." required></textarea>

            <button type="submit">Send to All Machines</button>
        </form>

        <br>
        <a href="/home">Back to Home</a>
    </div>

</body>

</html>
