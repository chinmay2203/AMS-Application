<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show m-3" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %} {% endif %} {% endwith %}

    <div class="container mt-5">
        <div class="card p-4 shadow mx-auto" style="max-width: 400px;">
            <h3 class="text-center mb-3">Login</h3>

            <form method="post">
                <input class="form-control mb-3" name="username" placeholder="Username" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

                <!-- 🔥 IMPORTANT: Machine ID -->
                <input type="hidden" name="machine_id" id="machine_id">

                <button class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
                <a href="/register">Create New Account</a>
            </div>

            <p class="text-center text-muted mt-2">admin / admin</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 🔥 Generate UNIQUE machine ID (only once per browser)
        function generateMachineId() {
            return 'machine-' + Math.random().toString(36).substring(2) + Date.now();
        }

        let storedId = localStorage.getItem("machine_id");

        if (!storedId) {
            storedId = generateMachineId();
            localStorage.setItem("machine_id", storedId);
        }

        // ✅ Set machine_id in hidden field
        document.getElementById("machine_id").value = storedId;

        console.log("Machine ID:", storedId);
    </script>

</body>

</html>
