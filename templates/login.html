<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show m-3">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %} {% endif %} {% endwith %}

    <div class="container mt-5">
        <div class="card p-4 shadow mx-auto" style="max-width: 400px;">
            <h3 class="text-center mb-3">Login</h3>

            <form method="post">
                <input class="form-control mb-3" name="username" placeholder="Username" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

                <input type="hidden" name="machine_id" id="machine_id">

                <button class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
                <a href="/register">Create New Account</a>
            </div>
        </div>
    </div>

    <script>
        function generateMachineId() {
            return 'machine-' + Math.random().toString(36).substring(2) + Date.now();
        }

        let id = localStorage.getItem("machine_id");

        if (!id) {
            id = generateMachineId();
            localStorage.setItem("machine_id", id);
        }

        document.getElementById("machine_id").value = id;
    </script>

</body>

</html>
