<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show m-3" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Python Web + Desktop App</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <div class="card p-3 shadow mb-4">
        <h5>Upload File</h5>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-2" required>
            <button class="btn btn-primary">Upload</button>
        </form>
    </div>

    <div class="card p-3 shadow mb-4">
        <h5>Open AMS Portal</h5>
        <form method="post" action="/open_ams">
            <button class="btn btn-primary mt-3">Open AMS Portal</button>
        </form>

    </div>
    
    <a href="/files" class="btn btn-info">View Uploaded Files</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
